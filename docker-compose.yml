services:
  api:
    build:
      context: .
    image: mlx-bitnet-api:local
    ports:
      - "8000:8000"
    environment:
      APP_HOST: "0.0.0.0"
      APP_PORT: "8000"
      DMR_BASE_URL: "http://model-runner.docker.internal:12434"
      MODEL_NAME: "hf.co/mlx-community/bitnet-b1.58-2B-4T"
      ENSURE_MODEL_ON_STARTUP: "true"
      REQUEST_TIMEOUT_SECONDS: "900"
      STARTUP_WAIT_TIMEOUT_SECONDS: "180"
      DEFAULT_MAX_TOKENS: "256"
      DEFAULT_TEMPERATURE: "0.7"
      DEFAULT_TOP_P: "0.95"
    extra_hosts:
      - "model-runner.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    models:
      bitnet:
        endpoint_var: AI_MODEL_URL
        model_var: AI_MODEL_NAME

models:
  bitnet:
    model: hf.co/mlx-community/bitnet-b1.58-2B-4T
